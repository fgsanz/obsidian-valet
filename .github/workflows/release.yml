name: Release

# Publish a GitHub Release whenever a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git archive --format=zip \
            --prefix="obsidian-valet-${VERSION}/" \
            -o "obsidian-valet-${VERSION}.zip" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: obsidian-valet-*.zip
