version: 2
updates:
  # npm dependencies (package.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle routine minor/patch bumps into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows (e.g. the release workflow)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
