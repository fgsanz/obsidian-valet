<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Obsidian Valet</title>
    <script>
      // Apply the mirrored resolved theme before first paint to avoid a flash. The mirror is
      // written by the app from the server's settings; on a brand-new browser it's absent, so we
      // fall back to the OS preference for that first paint.
      (function () {
        try {
          var t = localStorage.getItem('ov-theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
